    <script>
        const SUPABASE_URL = "https://riyajawkexkczyirjpig.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpeWFqYXdrZXhrY3p5aXJqcGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NDgzMDIsImV4cCI6MjA5ODAyNDMwMn0.adrdzoBddpSgeuWAnxZUWgGBAY-3HFA6_-EnK8bU2j0";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let tableMap = {};
        let isFirstLoad = true;
        let globalSettingsObj = {}; // လက်ရှိ Settings ပုံလင့်ခ်ဟောင်းတွေ သိမ်းထားရန်

        function playAlertSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc1 = audioCtx.createOscillator(); let gain1 = audioCtx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                gain1.gain.setValueAtTime(0.3, audioCtx.currentTime); gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc1.connect(gain1); gain1.connect(audioCtx.destination); osc1.start(); osc1.stop(audioCtx.currentTime + 0.15);
                setTimeout(() => {
                    let osc2 = audioCtx.createOscillator(); let gain2 = audioCtx.createGain();
                    osc2.type = 'sine'; osc2.frequency.setValueAtTime(880, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(0.4, audioCtx.currentTime); gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc2.connect(gain2); gain2.connect(audioCtx.destination); osc2.start(); osc2.stop(audioCtx.currentTime + 0.25);
                }, 120);
            } catch (e) {}
        }

        function showToast(msg, type = "info") {
            const toast = document.getElementById('toast-noti'); toast.innerText = msg;
            if (type === "success") { toast.className = "fixed top-5 right-5 z-50 bg-emerald-600 text-white font-bold text-xs py-3 px-5 rounded-xl shadow-2xl border border-emerald-500 transform transition-all duration-300 opacity-100 translate-y-0"; }
            else if (type === "error") { toast.className = "fixed top-5 right-5 z-50 bg-red-600 text-white font-bold text-xs py-3 px-5 rounded-xl shadow-2xl border border-red-500 transform transition-all duration-300 opacity-100 translate-y-0"; }
            else { toast.className = "fixed top-5 right-5 z-50 bg-slate-900 text-white font-bold text-xs py-3 px-5 rounded-xl shadow-2xl border border-slate-700 transform transition-all duration-300 opacity-100 translate-y-0"; }
            if (type !== "loading") { setTimeout(() => { toast.classList.add('opacity-0'); toast.classList.add('translate-y-[-100px]'); }, 2500); }
        }

        function clearFileInput(id) { document.getElementById(id).value = ''; showToast("📷 ပုံကို ဖျက်လိုက်ပါပြီ။"); }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => { tab.classList.remove('block'); tab.classList.add('hidden'); });
            const activeTab = document.getElementById(tabId);
            if(activeTab) { activeTab.classList.remove('hidden'); activeTab.classList.add('block'); }
            if (tabId === 'menu-tab') fetchMenuItems();
            if (tabId === 'tables-tab') fetchTables();
            if (tabId === 'settings-tab') fetchShopSettings();
        }

        window.onload = async function() { await loadTableMap(); fetchShopSettings(); fetchOrdersRealtime(); };

        async function loadTableMap() {
            try {
                const { data } = await supabaseClient.from('restaurant_tables').select('id, table_number');
                if(data) { data.forEach(t => { tableMap[t.id] = t.table_number; }); }
            } catch(e) {}
        }

        // URL လင့်ခ်ထဲကနေ Storage ဖိုင်အမည်ကို ဆွဲထုတ်ပေးမည့် Helper လုပ်ဆောင်ချက်
        function getFileNameFromUrl(url) {
            if (!url) return null;
            try { return url.split('/').pop(); } catch(e) { return null; }
        }

        // Supabase Storage ထဲက ပုံကို အပြီးတိုင် ဖျက်ပေးမည့် စနစ်
        async function deleteImageFromStorage(url) {
            const fileName = getFileNameFromUrl(url);
            if (!fileName) return;
            try { await supabaseClient.storage.from('pos-images').remove([fileName]); } catch(e) {}
        }

        function processAndCropImage(file, targetWidth = 400, targetHeight = 400) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = function(event) {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = function() {
                        const canvas = document.createElement('canvas'); canvas.width = targetWidth; canvas.height = targetHeight;
                        const ctx = canvas.getContext('2d');
                        let sourceX = 0, sourceY = 0, sourceWidth = img.width, sourceHeight = img.height;
                        if (img.width > img.height) { sourceWidth = img.height; sourceX = (img.width - img.height) / 2; } 
                        else { sourceHeight = img.width; sourceY = (img.height - img.width) / 2; }
                        ctx.drawImage(img, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, targetWidth, targetHeight);
                        canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', 0.85);
                    };
                };
            });
        }

        async function uploadImage(fileInputId, pathPrefix, autoCrop = false) {
            const fileInput = document.getElementById(fileInputId);
            if (!fileInput || fileInput.files.length === 0) return null;
            showToast("⏳ ဓာတ်ပုံတင်နေပါသည်...", "loading");
            let file = fileInput.files[0];
            if (autoCrop) { try { file = await processAndCropImage(file); } catch(e) {} }
            const fileName = `${pathPrefix}-${Date.now()}.jpg`;
            const { data, error } = await supabaseClient.storage.from('pos-images').upload(fileName, file);
            if (error) throw error;
            const { data: urlData } = supabaseClient.storage.from('pos-images').getPublicUrl(fileName);
            return urlData.publicUrl;
        }

        async function fetchShopSettings() {
            try {
                const { data } = await supabaseClient.from('pos-images').select('*').eq('id', 1).single();
                if (data) {
                    globalSettingsObj = data;
                    document.getElementById('shop-name-input').value = data.shop_name || '';
                    document.getElementById('shop-discount-input').value = data.discount_percentage || 0;
                    document.getElementById('shop-event-input').value = data.event_title || '';
                    document.getElementById('shop-theme-input').value = data.theme_mode || 'light';
                    document.getElementById('shop-password-input').value = localStorage.getItem('admin_pwd') || 'admin123';

                    // လက်ရှိ လိုဂိုပုံရှိရင် ပြသရန်
                    if (data.logo_url) {
                        document.getElementById('current-logo-img').src = data.logo_url;
                        document.getElementById('current-logo-box').classList.remove('hidden');
                    } else { document.getElementById('current-logo-box').classList.add('hidden'); }

                    // လက်ရှိ နောက်ခံပုံရှိရင် ပြသရန်
                    if (data.bg_image_url) {
                        document.getElementById('current-bg-img').src = data.bg_image_url;
                        document.getElementById('current-bg-box').classList.remove('hidden');
                    } else { document.getElementById('current-bg-box').classList.add('hidden'); }
                }
            } catch (err) {}
        }

        // ဆက်တင်ထဲက Logo သို့မဟုတ် BG ပုံကို Storage ထဲကပါ ဖျက်ပေးမည့် စနစ်
        async function deleteCurrentAsset(type) {
            if (!confirm("❌ ၎င်းပုံဟောင်းကို Supabase Storage ထဲကပါ လုံးဝ အပြီးတိုင် ဖျက်ပစ်မလားဗျာ?")) return;
            showToast("⏳ ဓာတ်ပုံဖျက်နေပါသည်...", "loading");
            if (type === 'logo' && globalSettingsObj.logo_url) {
                await deleteImageFromStorage(globalSettingsObj.logo_url);
                await supabaseClient.from('restaurant_settings').update({ logo_url: null }).eq('id', 1);
            } else if (type === 'bg' && globalSettingsObj.bg_image_url) {
                await deleteImageFromStorage(globalSettingsObj.bg_image_url);
                await supabaseClient.from('restaurant_settings').update({ bg_image_url: null }).eq('id', 1);
            }
            showToast("✅ Storage ထဲမှ ပုံကို အောင်မြင်စွာ ဖျက်ပြီးပါပြီ။", "success");
            fetchShopSettings();
        }

        async function saveShopSettings() {
            try {
                const name = document.getElementById('shop-name-input').value;
                const discount = parseInt(document.getElementById('shop-discount-input').value) || 0;
                const event = document.getElementById('shop-event-input').value;
                const theme = document.getElementById('shop-theme-input').value;
                const newPwd = document.getElementById('shop-password-input').value;

                // 🔐 စကားဝှက်အသစ်ကို သိမ်းဆည်းခြင်း
                if (newPwd) { localStorage.setItem('admin_pwd', newPwd); }
                
                // ပုံအသစ်တင်ရင် ပုံဟောင်းကို Storage ထဲကပါ အလိုအလျောက် သွားဖျက်မည်
                const newLogoUrl = await uploadImage('shop-logo-file', 'logo', true);
                if (newLogoUrl && globalSettingsObj.logo_url) { await deleteImageFromStorage(globalSettingsObj.logo_url); }

                const newBgUrl = await uploadImage('shop-bg-file', 'bg', false);
                if (newBgUrl && globalSettingsObj.bg_image_url) { await deleteImageFromStorage(globalSettingsObj.bg_image_url); }

                let updateData = { id: 1, shop_name: name, discount_percentage: discount, event_title: event, theme_mode: theme };
                if (newLogoUrl) updateData.logo_url = newLogoUrl;
                if (newBgUrl) updateData.bg_image_url = newBgUrl;

                const { error } = await supabaseClient.from('restaurant_settings').upsert(updateData);
                if (error) throw error;
                showToast("✅ ဆက်တင်များနှင့် စကားဝှက်ကို သိမ်းဆည်းပြီးပါပြီဗျာ။", "success");
                fetchShopSettings();
            } catch (err) { showToast("အမှားရှိပါသည်: " + err.message, "error"); }
        }

        async function fetchMenuItems() {
            try {
                const { data } = await supabaseClient.from('menus').select('*').order('id', { ascending: true });
                const container = document.getElementById('menu-list-container'); container.innerHTML = '';
                if(data) {
                    data.forEach(item => {
                        let imgUrl = item.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=100';
                        let catText = item.category === 'Drink' ? '🍹 ယာမကာ' : '🍝 အစားအစာ';
                        container.innerHTML += `
                            <tr class="border-b border-slate-200 hover:bg-slate-50 text-sm">
                                <td class="p-4"><img src="${imgUrl}" class="w-10 h-10 object-cover rounded-lg shadow-xs"></td>
                                <td class="p-4 font-bold">${item.name}</td>
                                <td class="p-4 text-xs font-bold text-slate-500">${catText}</td>
                                <td class="p-4 text-right font-bold text-orange-600">${item.price.toLocaleString()} ကျပ်</td>
                                <td class="p-4 text-center"><span class="px-2 py-1 rounded-md text-xs ${item.is_available ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'} font-bold">${item.is_available ? 'ရနိုင်သည်' : 'ကုန်ပြီ'}</span></td>
                                <td class="p-4 text-center space-x-2">
                                    <button onclick="toggleMenuStatus(${item.id}, ${item.is_available})" class="text-amber-600 hover:text-amber-800 text-xs font-bold cursor-pointer">အခြေအနေပြောင်း</button>
                                    <button onclick="deleteMenuItem(${item.id}, '${item.image_url}')" class="text-red-500 hover:text-red-700 text-xs font-bold cursor-pointer">ဖျက်မည်</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (err) {}
        }

        async function addMenuItem() {
            try {
                const name = document.getElementById('menu-name').value;
                const price = parseInt(document.getElementById('menu-price').value);
                const category = document.getElementById('menu-category').value;
                if(!name || !price) return showToast("⚠️ အချက်အလက်များ ပြည့်စုံအောင် ဖြည့်ပေးပါဦး။", "error");
                const imageUrl = await uploadImage('menu-file-input', 'food', true);
                await supabaseClient.from('menus').insert([{ name, price, category, image_url: imageUrl, is_available: true }]);
                showToast("✅ ဟင်းပွဲအသစ် ထည့်သွင်းအောင်မြင်ပါသည်ဗျာ။", "success");
                document.getElementById('menu-name').value = ''; document.getElementById('menu-price').value = ''; document.getElementById('menu-file-input').value = '';
                fetchMenuItems();
            } catch(err) { showToast("တင်မရပါ: " + err.message, "error"); }
        }

        async function toggleMenuStatus(id, currentStatus) { await supabaseClient.from('menus').update({ is_available: !currentStatus }).eq('id', id); fetchMenuItems(); }
        
        // 🔥 [စနစ်သစ်] မီနူးဖျက်လိုက်ရင် ဓာတ်ပုံကိုပါ Storage ထဲက တစ်ပါတည်း ဖျက်ပေးမည့်စနစ်
        async function deleteMenuItem(id, imageUrl) {
            if(confirm('ယခုမီနူးကို ဖျက်ပစ်ပါက Supabase Storage ထဲက ဓာတ်ပုံပါ အပြီးတိုင် ပျက်သွားမည် ဖြစ်သည်။ သေချာပါသလားဗျာ?')) {
                showToast("⏳ စာရင်းနှင့် ဓာတ်ပုံများကို ဖျက်နေပါသည်...", "loading");
                if (imageUrl) { await deleteImageFromStorage(imageUrl); } // ပုံအရင်ဖျက်သည်
                await supabaseClient.from('menus').delete().eq('id', id); // Database စာရင်းဖျက်သည်
                showToast("🗑️ မီနူးနှင့် ဓာတ်ပုံကို Storage ထဲမှ အပြီးဖျက်ပြီးပါပြီ။", "success");
                fetchMenuItems();
            }
        }

        async function fetchTables() {
            try {
                const { data } = await supabaseClient.from('restaurant_tables').select('*').order('id', { ascending: true });
                const container = document.getElementById('tables-list-container'); container.innerHTML = '';
                if(data) {
                    data.forEach(t => {
                        let myHostingUrl = "https://shwemezanet-wifi.github.io/-"; 
                        let qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(myHostingUrl + '?table=' + t.id)}`;
                        container.innerHTML += `
                            <div class="bg-white p-5 rounded-2xl border border-slate-200 text-center relative shadow-xs flex flex-col items-center">
                                <div class="text-lg font-black text-slate-800 mb-1">${t.table_number}</div>
                                <div class="text-xs ${t.status === 'available' ? 'text-emerald-500' : 'text-amber-500'} font-bold mb-3">${t.status === 'available' ? '🟢 အားပါသည်' : '🔴 လူရှိပါသည်'}</div>
                                <img src="${qrUrl}" class="w-32 h-32 border p-2 rounded-xl bg-slate-50 mb-3 shadow-xs">
                                <a href="${qrUrl}" target="_blank" class="text-xs font-bold text-orange-500 hover:underline">📥 QR Code</a>
                                <button onclick="deleteTable(${t.id})" class="absolute top-3 right-3 text-slate-300 hover:text-red-500 font-bold cursor-pointer">✕</button>
                            </div>
                        `;
                    });
                }
            } catch(err) {}
        }

        async function addTable() {
            const id = parseInt(document.getElementById('table-id-input').value); const name = document.getElementById('table-number-input').value;
            if(!id || !name) return alert('ဖြည့်ပေးပါဗျာ');
            await supabaseClient.from('restaurant_tables').insert([{ id, table_number: name, status: 'available' }]);
            document.getElementById('table-id-input').value = ''; document.getElementById('table-number-input').value = '';
            await loadTableMap(); fetchTables();
        }
        async function deleteTable(id) { if(confirm('ဖျက်မလားဗျာ?')) { await supabaseClient.from('restaurant_tables').delete().eq('id', id); await loadTableMap(); fetchTables(); } }

        function fetchOrdersRealtime() {
            loadOrders();
            supabaseClient.channel('admin-orders').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, (payload) => { 
                if (payload.eventType === 'INSERT' && !isFirstLoad) { playAlertSound(); showToast("🔔 အော်ဒါအသစ်တစ်ခု ရောက်ရှိလာပါပြီဗျာ။", "info"); }
                loadOrders(); 
            }).subscribe();
        }

        async function loadOrders() {
            try {
                const { data } = await supabaseClient.from('orders').select('*').order('id', { ascending: false });
                const container = document.getElementById('orders-container'); container.innerHTML = ''; isFirstLoad = false;
                if(!data || data.length === 0) { container.innerHTML = '<p class="text-slate-400 italic p-4 bg-white rounded-2xl border border-slate-100 col-span-full">လက်ရှိ အော်ဒါ မရှိသေးပါဗျာ။</p>'; return; }
                data.forEach(order => {
                    let itemsHtml = ''; let items = []; try { items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items; } catch(e) {}
                    if(Array.isArray(items)) { items.forEach(i => { itemsHtml += `<div class="flex justify-between text-sm py-1.5 border-b border-slate-100 font-medium"><span>• ${i.name} x ${i.qty}</span><span class="text-slate-500">${(i.price * i.qty).toLocaleString()} ကျပ်</span></div>`; }); }
                    let tableNameDisplay = tableMap[order.table_id] || `ဝိုင်း ID: ${order.table_id}`;
                    let statusBadge = order.status === 'pending' ? '<span class="text-xs font-bold px-2.5 py-1 rounded-full bg-amber-100 text-amber-700">⏳ အော်ဒါရရှိသည်</span>' : '<span class="text-xs font-bold px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700">💰 Ngwe Shin Pye</span>';
                    container.innerHTML += `
                        <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-xs flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-3">
                                    <div><span class="inline-block bg-orange-100 text-orange-800 text-xs font-black px-2.5 py-1 rounded-md mb-1">${tableNameDisplay}</span></div>
                                    ${statusBadge}
                                </div>
                                <div class="space-y-1 my-3 bg-slate-50 p-3 rounded-xl">${itemsHtml}</div>
                                <div class="flex justify-between items-center font-black text-slate-800 mt-2 pt-2 border-t border-dashed border-slate-200"><span>စုစုပေါင်း:</span><span class="text-orange-600">${parseInt(order.total_price).toLocaleString()} ကျပ်</span></div>
                            </div>
                            <div class="flex gap-2 mt-4 pt-3 border-t border-slate-100">
                                ${order.status === 'pending' ? `<button onclick="confirmPayment(${order.id}, ${order.table_id})" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2.5 px-3 rounded-xl transition cursor-pointer">✅ Ngwe Shin Pye</button>` : ''}
                                <button onclick="deleteOrder(${order.id})" class="bg-slate-100 hover:bg-red-50 text-slate-400 hover:text-red-500 py-2.5 px-3 rounded-xl transition text-xs font-bold cursor-pointer">✕</button>
                            </div>
                        </div>
                    `;
                });
            } catch(err) {}
        }

        async function confirmPayment(orderId, tableId) { await supabaseClient.from('orders').update({ status: 'paid' }).eq('id', orderId); await supabaseClient.from('restaurant_tables').update({ status: 'available' }).eq('id', tableId); loadOrders(); }
        async function deleteOrder(id) { if(confirm('ဖျက်မလားဗျာ?')) { await supabaseClient.from('orders').delete().eq('id', id); loadOrders(); } }
    </script>
    <style> .vertical-top { vertical-align: top; } </style>
</body>
</html>
