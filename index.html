<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shwe Me POS - Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 m-0 p-0 transition-colors duration-300" id="body-layout">

    <div id="receipt-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl border border-slate-100 text-center relative animate-fade-in">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">🎉</div>
            <h3 class="text-xl font-black text-slate-900 mb-1">သုံးဆောင်မှုအတွက် ကျေးဇူးတင်ပါသည်</h3>
            <p class="text-xs text-slate-500 mb-4" id="receipt-date"></p>
            
            <div class="bg-slate-50 p-4 rounded-2xl text-left space-y-2 mb-4 text-sm" id="receipt-items-box"></div>
            <div class="flex justify-between font-black text-lg border-t border-dashed pt-3 mb-5">
                <span>စုစုပေါင်းကျသင့်ငွေ:</span>
                <span class="text-emerald-600" id="receipt-total-price">0 ကျပ်</span>
            </div>
            <button onclick="closeReceiptAndGoHome()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-xl transition cursor-pointer">🏠 မီနူးသို့ ပြန်သွားမည်</button>
        </div>
    </div>

    <div class="max-w-md mx-auto min-h-screen flex flex-col justify-between bg-white shadow-xl relative pb-24">
        
        <div id="shop-banner" class="bg-slate-900 text-white p-6 rounded-b-3xl relative overflow-hidden bg-cover bg-center min-h-40 flex flex-col justify-end">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/40 to-transparent"></div>
            <div class="relative z-10 flex items-center gap-4">
                <img id="shop-logo" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=100" class="w-16 h-16 object-cover rounded-2xl border-2 border-white shadow-md hidden">
                <div>
                    <h2 id="shop-name" class="text-xl font-black tracking-wide">Welcome to Our Shop</h2>
                    <span id="table-badge" class="inline-block bg-orange-500 text-white font-black text-xs px-2.5 py-0.5 rounded-md mt-1">ဝိုင်းနံပါတ် စစ်ဆေးနေဆဲ...</span>
                </div>
            </div>
        </div>

        <div id="promo-banner" class="mx-4 mt-4 bg-orange-500 text-white p-4 rounded-2xl hidden">
            <h4 id="promo-title" class="font-black text-sm">PROMOTION</h4>
            <p class="text-xs opacity-90">ယနေ့မှာယူမှုအားလုံးကို <span id="promo-discount" class="font-bold">0</span>% လျှော့စျေးပေးနေပါပြီဗျာ!</p>
        </div>

        <div class="p-4 flex-1">
            <h3 class="font-black text-lg text-slate-800 mb-4 border-l-4 border-orange-500 pl-2">🍝 မီနူးစာရင်းများ</h3>
            <div id="menu-container" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div id="cart-bar" class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-sm bg-slate-900/95 backdrop-blur-md text-white p-3 rounded-2xl shadow-xl flex justify-between items-center z-40 transform translate-y-24 opacity-0 transition-all duration-300">
            <div class="flex items-center gap-3">
                <div class="bg-orange-500 w-10 h-10 rounded-xl flex items-center justify-center font-black" id="cart-count">0</div>
                <div>
                    <div class="text-xs text-slate-400">စုစုပေါင်း ကျပ်</div>
                    <div class="font-black text-sm" id="cart-total">0</div>
                </div>
            </div>
            <button onclick="orderNow()" class="bg-orange-500 hover:bg-orange-600 font-bold text-xs py-2.5 px-4 rounded-xl transition cursor-pointer">🛒 အော်ဒါတင်မည်</button>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://riyajawkexkczyirjpig.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpeWFqYXdrZXhrY3p5aXJqcGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NDgzMDIsImV4cCI6MjA5ODAyNDMwMn0.adrdzoBddpSgeuWAnxZUWgGBAY-3HFA6_-EnK8bU2j0";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let tableId = null;
        let cart = {};
        let discountPercent = 0;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            tableId = parseInt(urlParams.get('table')) || null;
            
            if(!tableId) {
                document.getElementById('table-badge').innerText = "❌ စားပွဲဝိုင်း QR မှတစ်ဆင့် ဝင်ရောက်ပေးပါဗျာ။";
                document.getElementById('table-badge').className = "inline-block bg-red-500 text-white font-black text-xs px-2.5 py-0.5 rounded-md mt-1";
            } else {
                fetchTableInfo();
                listenToOrderUpdate(); // Admin ငွေရှင်းတာ စောင့်ကြည့်မယ့် Real-time function
            }
            fetchShopSettings();
            fetchMenus();
        };

        async function fetchTableInfo() {
            try {
                const { data } = await supabaseClient.from('restaurant_tables').select('table_number').eq('id', tableId).single();
                if(data) { document.getElementById('table-badge').innerText = `🪑 ${data.table_number}`; }
            } catch(e) {}
        }

        async function fetchShopSettings() {
            try {
                const { data } = await supabaseClient.from('restaurant_settings').select('*').eq('id', 1).single();
                if(data) {
                    document.getElementById('shop-name').innerText = data.shop_name || "Shwe Me POS";
                    if(data.logo_url) {
                        const img = document.getElementById('shop-logo'); img.src = data.logo_url; img.classList.remove('hidden');
                    }
                    if(data.bg_image_url) {
                        document.getElementById('shop-banner').style.backgroundImage = `url('${data.bg_image_url}')`;
                    }
                    if(data.discount_percentage > 0) {
                        discountPercent = data.discount_percentage;
                        document.getElementById('promo-discount').innerText = discountPercent;
                        document.getElementById('promo-banner').classList.remove('hidden');
                    }
                    if(data.theme_mode === 'dark') {
                        document.getElementById('body-layout').className = "bg-slate-900 text-slate-100 m-0 p-0";
                    }
                }
            } catch(e) {}
        }

        async function fetchMenus() {
            try {
                const { data } = await supabaseClient.from('menus').select('*').eq('is_available', true);
                const container = document.getElementById('menu-container'); container.innerHTML = '';
                if(data) {
                    data.forEach(m => {
                        let imgUrl = m.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=150';
                        container.innerHTML += `
                            <div class="bg-white rounded-2xl border border-slate-100 shadow-xs overflow-hidden flex flex-col justify-between p-3 text-slate-800">
                                <img src="${imgUrl}" class="w-full h-28 object-cover rounded-xl mb-2 shadow-inner">
                                <div>
                                    <h4 class="font-bold text-sm leading-tight mb-1">${m.name}</h4>
                                    <div class="text-orange-600 font-black text-xs mb-2">${m.price.toLocaleString()} ကျပ်</div>
                                </div>
                                <div class="flex items-center justify-between gap-1 bg-slate-50 p-1 rounded-xl">
                                    <button onclick="updateQty(${m.id}, '${m.name}', ${m.price}, -1)" class="w-7 h-7 bg-white rounded-lg shadow-xs font-black text-slate-600">-</button>
                                    <span id="qty-${m.id}" class="font-black text-xs">0</span>
                                    <button onclick="updateQty(${m.id}, '${m.name}', ${m.price}, 1)" class="w-7 h-7 bg-white rounded-lg shadow-xs font-black text-orange-500">+</button>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch(e) {}
        }

        function updateQty(id, name, price, change) {
            if(!cart[id]) cart[id] = { name, price, qty: 0 };
            cart[id].qty += change;
            if(cart[id].qty <= 0) delete cart[id];
            
            const qtyElement = document.getElementById(`qty-${id}`);
            if(qtyElement) qtyElement.innerText = cart[id] ? cart[id].qty : 0;
            
            renderCartBar();
        }

        function renderCartBar() {
            let totalItems = 0; let totalPrice = 0;
            for(let id in cart) { totalItems += cart[id].qty; totalPrice += (cart[id].price * cart[id].qty); }
            
            if(discountPercent > 0) { totalPrice = totalPrice - (totalPrice * (discountPercent/100)); }
            
            const bar = document.getElementById('cart-bar');
            if(totalItems > 0) {
                document.getElementById('cart-count').innerText = totalItems;
                document.getElementById('cart-total').innerText = totalPrice.toLocaleString();
                bar.className = "fixed bottom-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-sm bg-slate-900/95 backdrop-blur-md text-white p-3 rounded-2xl shadow-xl flex justify-between items-center z-40 transform translate-y-0 opacity-100 transition-all duration-300";
            } else {
                bar.className = "fixed bottom-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-sm bg-slate-900/95 backdrop-blur-md text-white p-3 rounded-2xl shadow-xl flex justify-between items-center z-40 transform translate-y-24 opacity-0 transition-all duration-300";
            }
        }

        async function orderNow() {
            if(!tableId) return alert("ဝိုင်းနံပါတ် မရှိပါသဖြင့် အော်ဒါတင်၍ မရပါဗျာ။");
            let itemsArray = []; let totalPrice = 0;
            for(let id in cart) { itemsArray.push(cart[id]); totalPrice += (cart[id].price * cart[id].qty); }
            if(discountPercent > 0) { totalPrice = totalPrice - (totalPrice * (discountPercent/100)); }

            try {
                // 1. Order တင်မည်
                await supabaseClient.from('orders').insert([{ table_id: tableId, items: itemsArray, total_price: totalPrice, status: 'pending' }]);
                // 2. စားပွဲဝိုင်း အခြေအနေကို 'occupied' (လူရှိသည်) ဟု ပြောင်းမည်
                await supabaseClient.from('restaurant_tables').update({ status: 'occupied' }).eq('id', tableId);
                
                alert("🎉 အော်ဒါ တင်သွင်းမှု အောင်မြင်ပါပြီဗျာ! ခေတ္တစောင့်ဆိုင်းပေးပါရန်။");
                // Cart ကို Reset လုပ်မည်
                cart = {}; renderCartBar(); fetchMenus();
            } catch(e) { alert("အော်ဒါတင်မရပါ: " + e.message); }
        }

        // 🔥 [စနစ်သစ်] Admin ဘက်က ငွေရှင်းလိုက်ရင် Customer ဘက်မှာ Auto Logout ဖြစ်ပြီး ဘောင်ချာပြမည့် စနစ်
        function listenToOrderUpdate() {
            supabaseClient.channel(`table-orders-${tableId}`)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'orders', filter: `table_id=eq.${tableId}` }, (payload) => {
                const updatedOrder = payload.new;
                // အကယ်၍ အော်ဒါ အခြေအနေက 'paid' (ငွေရှင်းပြီး) ဖြစ်သွားပါက
                if (updatedOrder && updatedOrder.status === 'paid') {
                    showReceipt(updatedOrder);
                }
            }).subscribe();
        }

        function showReceipt(order) {
            document.getElementById('receipt-date').innerText = new Date().toLocaleString();
            let itemsBox = document.getElementById('receipt-items-box'); itemsBox.innerHTML = '';
            
            let items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
            if (Array.isArray(items)) {
                items.forEach(i => {
                    itemsBox.innerHTML += `<div class="flex justify-between"><span>• ${i.name} x ${i.qty}</span><span>${(i.price * i.qty).toLocaleString()} ကျပ်</span></div>`;
                });
            }
            document.getElementById('receipt-total-price').innerText = parseInt(order.total_price).toLocaleString() + " ကျပ်";
            document.getElementById('receipt-modal').classList.remove('hidden'); // ဘောင်ချာ Modal ဖွင့်မည်
        }

        function closeReceiptAndGoHome() {
            document.getElementById('receipt-modal').classList.add('hidden');
            // စားပွဲဝိုင်း Link အမှန်အတိုင်း Reset လုပ်ပြီး Page ပြန်ဖွင့်မည်
            window.location.href = window.location.pathname + "?table=" + tableId;
        }
    </script>
</body>
</html>
